name: Release

# Trigger on a version tag (e.g. `git tag v0.1.0 && git push origin v0.1.0`).
# The `quality` job (lint + tests + dependency audits) must pass before any
# platform is built and uploaded to the GitHub Release.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Lint, test & dependency audit
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust (stable + clippy + rustfmt)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      # --- Dependency security ---
      - name: Audit npm dependencies (fail on high/critical)
        run: npm audit --audit-level=high

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: Audit Rust dependencies (RustSec)
        working-directory: src-tauri
        run: cargo audit

      # --- Lint ---
      - name: Formatting (rustfmt --check)
        working-directory: src-tauri
        run: cargo fmt --all --check

      - name: Typecheck & build frontend (tsc + vite)
        run: npm run build

      - name: Clippy (deny warnings)
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

      # --- Tests ---
      - name: Rust tests
        working-directory: src-tauri
        run: cargo test

  release:
    name: Build & release (${{ matrix.platform }} ${{ matrix.args }})
    needs: quality
    # Only build/publish on a version tag. A manual workflow_dispatch from a
    # branch runs just the `quality` gate (no bogus release is created).
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'   # Apple Silicon
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'   # Intel
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          # macOS runners build both arches; other platforms keep the host target.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      # tauri-action runs `tauri build` (which runs the frontend build via
      # beforeBuildCommand), bundles per-OS installers, and uploads them to a
      # draft GitHub Release named after the tag.
      #
      # To produce signed/notarized builds later, add the signing secrets and
      # expose them here, e.g. (macOS):
      #   env:
      #     APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      #     APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      #     APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      #     APPLE_ID: ${{ secrets.APPLE_ID }}
      #     APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
      #     APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      - name: Build & upload (tauri-action)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'claude-multi ${{ github.ref_name }}'
          releaseBody: |
            Download the installer for your OS below.

            Builds are **unsigned** (ad-hoc) — on first launch your OS may warn
            about an unidentified developer. See the README for how to allow it.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
